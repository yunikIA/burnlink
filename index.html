<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enlace seguro</title>
  <meta name="description" content="Contenido seguro y privado." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #ff3b1f;
      --text: #f0ece4;
      --muted: #555;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,59,31,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,59,31,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrap {
      text-align: center;
      padding: 24px;
      position: relative;
      z-index: 1;
      animation: fadeIn .6s ease both;
    }

    .icon { font-size: 64px; margin-bottom: 24px; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
      color: var(--text);
    }

    p {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🔒</div>
    <h1>Enlace no disponible</h1>
    <p>Este enlace no existe<br>o ya fue utilizado</p>
  </div>

  <!-- Firebase para verificar ?id= -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBLqHcWApjbbqjasgk-H4bGg5KN5Bf-Fss",
      authDomain:        "burnlink-48b09.firebaseapp.com",
      projectId:         "burnlink-48b09",
      storageBucket:     "burnlink-48b09.firebasestorage.app",
      messagingSenderId: "102519825848",
      appId:             "1:102519825848:web:6a3d1ac53fbff5de611b4d"
    };
    firebase.initializeApp(firebaseConfig);

    // Si hay ?id= redirigir al viewer
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      window.location.replace('/create?id=' + id);
    }
  </script>
</body>
</html>
