<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BurnLink — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   BurnLink — style.css
   ============================================================ */

/* ── Variables ── */
:root {
  --bg:       #0a0a0a;
  --surface:  #111111;
  --border:   #222222;
  --accent:   #ff3b1f;
  --accent2:  #ff7c54;
  --text:     #f0ece4;
  --muted:    #666666;
  --green:    #2dff6a;
  --mono:     'Space Mono', monospace;
  --sans:     'Syne', sans-serif;
  --radius:   12px;
}

/* ── Reset ── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ── Base ── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,59,31,.10), transparent),
    radial-gradient(ellipse 60% 40% at 80% 80%,  rgba(255,124,84,.05), transparent);
  pointer-events: none;
  z-index: 0;
}

/* ── Admin corner button ── */
.admin-corner-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 50;
  background: rgba(17,17,17,.9);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 8px 14px;
  text-decoration: none;
  backdrop-filter: blur(8px);
  transition: color .2s, border-color .2s, background .2s;
}

.admin-corner-btn:hover {
  color: var(--accent);
  border-color: rgba(255,59,31,.4);
  background: rgba(255,59,31,.06);
}

/* ── Grid background ── */
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,59,31,.04)  1px, transparent 1px),
    linear-gradient(90deg, rgba(255,59,31,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ── */
.container {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 60px 24px 80px;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 56px;
  animation: fadeDown .6s ease both;
}

.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.flame {
  font-size: 32px;
  animation: flicker 1.5s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 12px rgba(255,59,31,.55));
}

@keyframes flicker {
  0%   { transform: rotate(-3deg) scale(1);    filter: drop-shadow(0 0  8px rgba(255,59,31,.55)); }
  100% { transform: rotate( 3deg) scale(1.08); filter: drop-shadow(0 0 20px rgba(255,124,84,.6)); }
}

h1 {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -2px;
  background: linear-gradient(135deg, var(--text) 40%, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 8px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 20px;
  animation: fadeUp .6s .1s ease both;
}

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 24px;
}

/* ── Inputs ── */
.input-group {
  margin-bottom: 24px;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: .5px;
}

input[type="url"],
input[type="number"],
input[type="text"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 14px 16px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,59,31,.12);
}

input::placeholder { color: #444; }

/* ── Duration grid ── */
.duration-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.dur-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  padding: 12px 8px;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  text-align: center;
}

.dur-btn:hover {
  border-color: #444;
  color: var(--text);
}

.dur-btn.active {
  background: rgba(255,59,31,.12);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 700;
}

.custom-duration {
  display: none;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
}

.custom-duration.visible { display: flex; }

.custom-duration input { flex: 1; }

select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 14px 16px;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
  -webkit-appearance: none;
}

select:focus { border-color: var(--accent); }

/* ── Toggles ── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.toggle-row:last-child { border-bottom: none; }

.toggle-info { flex: 1; }

.toggle-info span {
  display: block;
  font-size: 14px;
  font-weight: 700;
}

.toggle-info small {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  display: block;
}

.toggle {
  width: 44px;
  height: 24px;
  background: var(--border);
  border-radius: 99px;
  position: relative;
  cursor: pointer;
  transition: background .2s;
  flex-shrink: 0;
  border: none;
  outline: none;
}

.toggle::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  background: #555;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: transform .2s, background .2s;
}

.toggle.on { background: rgba(255,59,31,.3); }

.toggle.on::after {
  transform: translateX(20px);
  background: var(--accent);
}

/* ── Generate button ── */
.btn-generate {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 800;
  padding: 18px;
  cursor: pointer;
  letter-spacing: .5px;
  position: relative;
  overflow: hidden;
  transition: transform .1s, box-shadow .2s, opacity .2s;
  margin-top: 8px;
}

.btn-generate::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  pointer-events: none;
}

.btn-generate:hover {
  box-shadow: 0 0 30px rgba(255,59,31,.5);
  transform: translateY(-1px);
}

.btn-generate:active { transform: translateY(0); }

.btn-generate:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── Result card ── */
.result-card {
  background: #050505;
  border: 1px solid #1a2e1a;
  border-radius: 16px;
  padding: 28px 32px;
  display: none;
  position: relative;
  overflow: hidden;
  margin-bottom: 20px;
}

.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  animation: scanline 2s ease-in-out infinite;
}

@keyframes scanline {
  0%, 100% { opacity: 0; transform: scaleX(.3); }
  50%       { opacity: 1; transform: scaleX(1);  }
}

.result-card.visible {
  display: block;
  animation: fadeUp .4s ease both;
}

.result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--green);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1);   }
  50%       { opacity: .5; transform: scale(.8); }
}

.result-header span {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
}

.link-display {
  background: var(--bg);
  border: 1px solid #1a2e1a;
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}

.link-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
  word-break: break-all;
  flex: 1;
}

.btn-copy {
  background: rgba(45,255,106,.10);
  border: 1px solid rgba(45,255,106,.30);
  border-radius: 8px;
  color: var(--green);
  font-family: var(--mono);
  font-size: 11px;
  padding: 8px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .2s;
  flex-shrink: 0;
}

.btn-copy:hover  { background: rgba(45,255,106,.20); }
.btn-copy.copied { background: rgba(45,255,106,.30); color: #fff; }

.meta-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.meta-chip {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.meta-chip strong { color: var(--text); }

#oneuse-chip { display: none; }

/* ── History ── */
.history-section {
  animation: fadeUp .6s .2s ease both;
  opacity: 0;
  animation-fill-mode: both;
}

.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.history-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}

.btn-clear {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: color .2s, background .2s;
}

.btn-clear:hover {
  color: var(--accent);
  background: rgba(255,59,31,.08);
}

/* ── Link items ── */
.link-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  transition: border-color .2s;
}

.link-item:hover { border-color: #333; }

.link-item.expired {
  opacity: .4;
  border-style: dashed;
}

.link-item-info {
  flex: 1;
  min-width: 0;
}

.link-item-url {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--green);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.link-item.expired .link-item-url {
  color: var(--muted);
  text-decoration: line-through;
}

.link-item-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

.link-item-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.countdown {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent2);
  white-space: nowrap;
  text-align: right;
  min-width: 70px;
}

.expired-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  background: rgba(255,59,31,.10);
  border: 1px solid rgba(255,59,31,.20);
  padding: 4px 8px;
  border-radius: 6px;
  white-space: nowrap;
}

.btn-delete {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 14px;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color .2s, color .2s, background .2s;
  flex-shrink: 0;
  line-height: 1;
  padding: 0;
}

.btn-delete:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,59,31,.08);
}

.empty-state {
  text-align: center;
  padding: 32px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1px;
}

/* ── Iframe overlay ── */
#iframe-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 150;
  background: #000;
}

#iframe-overlay.active {
  display: block;
}

#content-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

#iframe-fallback {
  display: none;
  position: absolute;
  inset: 0;
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  z-index: 10;
}

#iframe-fallback.active {
  display: flex;
}

/* ── Loading overlay ── */
#loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

#loading-overlay.active { display: flex; }

.loading-flame {
  font-size: 56px;
  animation: flicker 1s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 20px rgba(255,59,31,.7));
  margin-bottom: 16px;
}

.loading-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ── Redirect overlay ── */
#redirect-overlay,
#expired-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

#redirect-overlay.active,
#expired-overlay.active { display: flex; }

.redirect-flame {
  font-size: 80px;
  margin-bottom: 24px;
  animation: burnOut 2s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255,59,31,1));
}

@keyframes burnOut {
  0%, 100% { transform: scale(1)    rotate(-2deg); filter: drop-shadow(0 0 20px #ff3b1f); }
  50%       { transform: scale(1.1) rotate( 2deg); filter: drop-shadow(0 0 50px #ff7c54); }
}

.redirect-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.redirect-subtitle {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 32px;
}

.redirect-url {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  margin-bottom: 24px;
  max-width: 500px;
  width: 100%;
  word-break: break-all;
}

.redirect-counter {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 700;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(255,59,31,.6);
  margin-bottom: 8px;
  line-height: 1;
}

.redirect-msg {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
}

.expired-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.expired-sub {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 32px;
}

.btn-back {
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  padding: 14px 28px;
  cursor: pointer;
  transition: box-shadow .2s, transform .1s;
}

.btn-back:hover {
  box-shadow: 0 0 20px rgba(255,59,31,.5);
  transform: translateY(-1px);
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0);    }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0);     }
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  z-index: 300;
  opacity: 0;
  transition: opacity .3s, transform .3s;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.error { border-color: rgba(255,59,31,.4); color: var(--accent2); }
.toast.success { border-color: rgba(45,255,106,.4); color: var(--green); }

/* ── Responsive ── */
@media (max-width: 500px) {
  h1 { font-size: 32px; }
  .duration-grid { grid-template-columns: repeat(2, 1fr); }
  .card { padding: 24px 20px; }
  .result-card { padding: 22px 20px; }
}

/* ══════════════════════════════════════════════
   NUEVOS ESTILOS v3 — multi-content
══════════════════════════════════════════════ */

/* ── Type selector grid ── */
.type-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.type-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  padding: 16px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: all .15s;
}

.type-btn:hover { border-color: #444; color: var(--text); }

.type-btn.active {
  background: rgba(255,59,31,.10);
  border-color: var(--accent);
  color: var(--accent);
}

.type-icon { font-size: 24px; }

/* ── Content panels ── */
.content-panel { display: none; }
.content-panel.active { display: block; }

textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 16px;
  outline: none;
  resize: vertical;
  min-height: 140px;
  transition: border-color .2s, box-shadow .2s;
  line-height: 1.6;
}

textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,59,31,.12);
}

textarea::placeholder { color: #444; }

/* ── Upload zone ── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.upload-zone:hover,
.upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(255,59,31,.04);
}

.upload-icon { font-size: 36px; margin-bottom: 4px; }

.upload-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.upload-sub {
  font-family: var(--mono);
  font-size: 11px;

/* Waveform animation */
.audio-wave {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  height: 48px;
  margin-bottom: 16px;
}

.audio-wave span {
  display: block;
  width: 4px;
  background: var(--accent);
  border-radius: 99px;
  animation: wave 1.2s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(255,59,31,.5);
}

.audio-wave span:nth-child(1)  { height: 16px; animation-delay: 0s;    }
.audio-wave span:nth-child(2)  { height: 32px; animation-delay: .1s;   }
.audio-wave span:nth-child(3)  { height: 44px; animation-delay: .2s;   }
.audio-wave span:nth-child(4)  { height: 28px; animation-delay: .3s;   }
.audio-wave span:nth-child(5)  { height: 48px; animation-delay: .4s;   }
.audio-wave span:nth-child(6)  { height: 36px; animation-delay: .3s;   }
.audio-wave span:nth-child(7)  { height: 44px; animation-delay: .2s;   }
.audio-wave span:nth-child(8)  { height: 24px; animation-delay: .1s;   }
.audio-wave span:nth-child(9)  { height: 38px; animation-delay: .05s;  }
.audio-wave span:nth-child(10) { height: 18px; animation-delay: 0s;    }

@keyframes wave {
  0%, 100% { transform: scaleY(1);   opacity: 1;   }
  50%       { transform: scaleY(.3); opacity: .5;  }
}

/* Type grid 7 cols en desktop */

  grid-template-columns: repeat(7, 1fr) !important;

  .type-grid { grid-template-columns: repeat(4, 1fr) !important; }
}
@media (max-width: 400px) {
  .type-grid { grid-template-columns: repeat(3, 1fr) !important; }

    <button class="btn-back" onclick="adminLogout()">Cerrar sesión</button>
  </div>

  <!-- ── TOP BAR ── -->
  <div class="admin-topbar" id="admin-topbar" style="display:none;">
    <div class="admin-topbar-left">
      <a href="index.html" class="admin-topbar-logo">🔥 BurnLink</a>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="admin-user">
      <img id="admin-avatar" src="" alt="avatar" onerror="this.style.display='none'" />
      <span class="admin-user-name" id="admin-email-display"></span>
      <button class="btn-logout" onclick="adminLogout()">Salir</button>
    </div>
  </div>

  <!-- ── ADMIN CONTENT ── -->
  <div id="admin-content">
    <div class="admin-container">

      <div class="admin-header">
        <h2>Panel de administración</h2>
        <p>TODOS LOS BURNLINKS · TIEMPO REAL</p>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number" id="stat-total">0</div>
          <div class="stat-label">Total links</div>
        </div>
        <div class="stat-card">
          <div class="stat-number green" id="stat-active">0</div>
          <div class="stat-label">Activos</div>
        </div>
        <div class="stat-card">
          <div class="stat-number accent" id="stat-expired">0</div>
          <div class="stat-label">Expirados</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="admin-toolbar">
        <div class="toolbar-left">
          <button class="filter-btn active" data-filter="all">Todos</button>
          <button class="filter-btn" data-filter="active">Activos</button>
          <button class="filter-btn" data-filter="expired">Expirados</button>
        </div>
        <button class="btn-delete-all" id="btn-delete-all">🗑 Borrar expirados</button>
      </div>

      <!-- Links list -->
      <div class="admin-links" id="admin-links-list"></div>

    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBLqHcWApjbbqjasgk-H4bGg5KN5Bf-Fss",
      authDomain:        "burnlink-48b09.firebaseapp.com",
      projectId:         "burnlink-48b09",
      storageBucket:     "burnlink-48b09.firebasestorage.app",
      messagingSenderId: "102519825848",
      appId:             "1:102519825848:web:6a3d1ac53fbff5de611b4d"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
  <script>
/* ============================================================
   BurnLink — admin.js
   Google Auth + Firestore admin panel
   ============================================================ */

'use strict';

/* ── Cuentas autorizadas ── */
const ADMIN_EMAILS = [
  'bryanescobar00899@gmail.com',
  'yunik.arg@gmail.com',
];

/* ── Firebase refs ── */
const auth     = firebase.auth();
const db       = firebase.firestore();
const linksCol = db.collection('burnlinks');

/* ── State ── */
let allLinks    = [];
let currentFilter = 'all';
let unsubscribe   = null;

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */

function formatDuration(secs) {
  if (secs < 60)     return secs + 's';
  if (secs < 3600)   return Math.round(secs / 60) + 'min';
  if (secs < 86400)  return Math.round(secs / 3600) + 'h';
  if (secs < 604800) return Math.round(secs / 86400) + 'd';
  return Math.round(secs / 604800) + 'sem';
}

function formatCountdown(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  if (s < 60)   return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  return h + 'h ' + m + 'm';
}

function formatDate(ts) {
  return new Date(ts).toLocaleString('es-AR', {
    day: '2-digit', month: '2-digit', year: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

function getBaseUrl() {
  return window.location.origin + '/';
}

function setLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('active', on);
}

function showToast(msg, type = '') {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.className = 'toast ' + type;
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 3000);
}

/* ══════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════ */

function showLogin() {
  setLoading(false);
  document.getElementById('login-screen').classList.add('active');
}

function showDenied(email) {
  setLoading(false);
  document.getElementById('denied-email').textContent = email;
  document.getElementById('denied-screen').classList.add('active');
}

function showAdmin(user) {
  setLoading(false);
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('denied-screen').classList.remove('active');

  // Topbar
  const topbar = document.getElementById('admin-topbar');
  topbar.style.display = 'flex';
  document.getElementById('admin-avatar').src         = user.photoURL || '';
  document.getElementById('admin-email-display').textContent = user.email;

  // Content
  document.getElementById('admin-content').classList.add('active');

  // Start listening
  startAdminListener();
}

document.getElementById('btn-google-login').addEventListener('click', async () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  try {
    await auth.signInWithPopup(provider);
  } catch (err) {
    console.error('Login error:', err);
    showToast('Error al iniciar sesión.', 'error');
  }
});

function adminLogout() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  auth.signOut().then(() => {
    document.getElementById('admin-content').classList.remove('active');
    document.getElementById('admin-topbar').style.display = 'none';
    document.getElementById('denied-screen').classList.remove('active');
    allLinks = [];
    showLogin();
  });
}

// Auth state observer
auth.onAuthStateChanged(user => {
  if (!user) {
    showLogin();
    return;
  }

  if (!ADMIN_EMAILS.includes(user.email.toLowerCase())) {
    showDenied(user.email);
    return;
  }

  showAdmin(user);
});

/* ══════════════════════════════════════════════
   FIRESTORE LISTENER
══════════════════════════════════════════════ */

function startAdminListener() {
  if (unsubscribe) unsubscribe();

  unsubscribe = linksCol
    .orderBy('created', 'desc')
    .onSnapshot(snapshot => {
      allLinks = snapshot.docs.map(doc => doc.data());
      updateStats();
      renderLinks();
    }, err => {
      console.error('Listener error:', err);
      showToast('Error de conexión.', 'error');
    });
}

/* ══════════════════════════════════════════════
   STATS
══════════════════════════════════════════════ */

function updateStats() {
  const now     = Date.now();
  const total   = allLinks.length;
  const expired = allLinks.filter(l => now > l.expiresAt || (l.oneUse && l.used)).length;
  const active  = total - expired;

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-expired').textContent = expired;
}

/* ══════════════════════════════════════════════
   RENDER LINKS
══════════════════════════════════════════════ */

function renderLinks() {
  const container = document.getElementById('admin-links-list');
  const now       = Date.now();

  let filtered = allLinks;
  if (currentFilter === 'active') {
    filtered = allLinks.filter(l => now <= l.expiresAt && !(l.oneUse && l.used));
  } else if (currentFilter === 'expired') {
    filtered = allLinks.filter(l => now > l.expiresAt || (l.oneUse && l.used));
  }

  if (!filtered.length) {
    container.innerHTML = '<div class="admin-empty">// sin links en esta categoría</div>';
    return;
  }

  container.innerHTML = filtered.map(link => {
    const expired   = now > link.expiresAt || (link.oneUse && link.used);
    const remaining = link.expiresAt - now;
    const burnUrl   = getBaseUrl() + '?id=' + link.id;
    const shortDest = link.url.length > 55 ? link.url.substring(0, 55) + '…' : link.url;
    const shortBurn = burnUrl.length > 50  ? burnUrl.substring(0, 50)  + '…' : burnUrl;

    const statusTag = expired
      ? (link.oneUse && link.used
          ? '<span class="tag tag-used">USADO</span>'
          : '<span class="tag tag-expired">EXPIRADO</span>')
      : '<span class="tag tag-active">ACTIVO</span>';

    const oneUseTag = link.oneUse
      ? '<span class="tag tag-oneuse">1 uso</span>'
      : '';

    const timeTag = `<span class="tag tag-time">${formatDuration(link.duration)} · ${formatDate(link.created)}</span>`;

    const rightContent = expired
      ? `<span class="expired-badge">DESTRUIDO</span>`
      : `<div class="admin-countdown" data-expires="${link.expiresAt}">${formatCountdown(remaining)}</div>`;

    return `
      <div class="admin-link-item${expired ? ' expired' : ''}" data-id="${link.id}">
        <div class="admin-link-main">
          <div class="admin-link-dest" title="${link.url}">→ ${shortDest}</div>
          <div class="admin-link-burn" title="${burnUrl}">🔗 ${shortBurn}</div>
          <div class="admin-link-tags">
            ${statusTag}
            ${oneUseTag}
            ${timeTag}
          </div>
        </div>
        <div class="admin-link-actions">
          ${rightContent}
          <button class="btn-admin-delete" onclick="adminDeleteLink('${link.id}')">🗑 Borrar</button>
        </div>
      </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════
   DELETE
══════════════════════════════════════════════ */

async function adminDeleteLink(id) {
  if (!confirm('¿Borrar este link?')) return;
  try {
    await linksCol.doc(id).delete();
    showToast('Link eliminado.', 'success');
  } catch (err) {
    console.error('Error eliminando:', err);
    showToast('Error al eliminar.', 'error');
  }
}

document.getElementById('btn-delete-all').addEventListener('click', async () => {
  const now     = Date.now();
  const expired = allLinks.filter(l => now > l.expiresAt || (l.oneUse && l.used));
  if (!expired.length) { showToast('No hay links expirados.', ''); return; }
  if (!confirm(`¿Borrar ${expired.length} links expirados?`)) return;

  try {
    const batch = db.batch();
    expired.forEach(l => batch.delete(linksCol.doc(l.id)));
    await batch.commit();
    showToast(`${expired.length} links eliminados.`, 'success');
  } catch (err) {
    console.error('Error borrando:', err);
    showToast('Error al borrar.', 'error');
  }
});

/* ══════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════ */

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    renderLinks();
  });
});

/* ══════════════════════════════════════════════
   COUNTDOWN TICKER
══════════════════════════════════════════════ */

setInterval(() => {
  const now = Date.now();
  document.querySelectorAll('.admin-countdown[data-expires]').forEach(el => {
    const exp = parseInt(el.dataset.expires, 10);
    const rem = exp - now;
    if (rem <= 0) {
      updateStats();
      renderLinks();
    } else {
      el.textContent = formatCountdown(rem);
    }
  });
}, 1000);

</script>
