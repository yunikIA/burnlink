<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BurnLink Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#111;--border:#222;--accent:#ff3b1f;--text:#f0ece4;--muted:#555;--green:#2dff6a;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
#loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.lf{font-size:52px;animation:fl 1s ease-in-out infinite alternate;filter:drop-shadow(0 0 20px rgba(255,59,31,.7))}
.lt{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:3px}
@keyframes fl{0%{transform:scale(1) rotate(-2deg)}100%{transform:scale(1.1) rotate(2deg)}}
#loginScreen,#deniedScreen{display:none;position:fixed;inset:0;background:var(--bg);z-index:50;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:380px;width:100%}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:none;border-radius:12px;color:#333;font-family:var(--sans);font-size:15px;font-weight:700;padding:15px;cursor:pointer}
#topbar{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,10,.95);border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;padding:0 24px;z-index:40}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--accent);background:rgba(255,59,31,.10);border:1px solid rgba(255,59,31,.25);padding:4px 8px;border-radius:5px}
.btn-sm{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:5px 10px;cursor:pointer}
#adminContent{display:none;padding-top:72px}
.wrap{max-width:900px;margin:0 auto;padding:0 24px 60px;position:relative;z-index:1}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.sn{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.sl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px}
.green{color:var(--green)}.red{color:var(--accent)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.filters{display:flex;gap:6px}
.fbtn{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--mono);font-size:11px;padding:7px 12px;cursor:pointer}
.fbtn.active{background:rgba(255,59,31,.10);border-color:var(--accent);color:var(--accent)}
.btn-de{background:rgba(255,59,31,.08);border:1px solid rgba(255,59,31,.2);border-radius:8px;color:var(--accent);font-family:var(--mono);font-size:11px;padding:7px 12px;cursor:pointer}
.item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.item.exp{opacity:.4;border-style:dashed}
.idest{font-family:var(--mono);font-size:12px;color:#ff7c54;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.iburn{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.itags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid}
.ta{color:var(--green);border-color:rgba(45,255,106,.3);background:rgba(45,255,106,.06)}
.te{color:var(--accent);border-color:rgba(255,59,31,.3);background:rgba(255,59,31,.06)}
.tu{color:#ff9f0a;border-color:rgba(255,159,10,.3);background:rgba(255,159,10,.06)}
.ti{color:var(--muted);border-color:var(--border)}
.iactions{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.icd{font-family:var(--mono);font-size:11px;font-weight:700;color:#ff7c54}
.bd{font-family:var(--mono);font-size:10px;color:var(--accent);background:rgba(255,59,31,.10);border:1px solid rgba(255,59,31,.20);padding:3px 7px;border-radius:4px}
.bdel{background:rgba(255,59,31,.08);border:1px solid rgba(255,59,31,.2);border-radius:7px;color:var(--accent);font-family:var(--mono);font-size:11px;padding:5px 10px;cursor:pointer}
.empty{text-align:center;padding:36px;color:var(--muted);font-family:var(--mono);font-size:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--text);z-index:300;opacity:0;transition:opacity .3s,transform .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(45,255,106,.4);color:var(--green)}
.toast.error{border-color:rgba(255,59,31,.4);color:#ff7c54}
.btnback{background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;padding:12px 24px;cursor:pointer;margin-top:20px}
</style>
</head>
<body>
<div id="loading"><div class="lf">🔥</div><p class="lt">VERIFICANDO ACCESO...</p></div>

<div id="loginScreen">
  <div class="lcard">
    <div style="font-size:44px;margin-bottom:18px">🔥</div>
    <h2 style="font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:6px">Admin Panel</h2>
    <p style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:24px">ACCESO RESTRINGIDO</p>
    <button class="btn-google" id="btnLogin">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar con Google
    </button>
    <p style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:16px">Solo cuentas autorizadas</p>
  </div>
</div>

<div id="deniedScreen">
  <div style="font-size:56px;margin-bottom:16px">🚫</div>
  <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Acceso Denegado</h2>
  <p style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:6px">CUENTA NO AUTORIZADA</p>
  <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:20px" id="deniedEmail"></p>
  <button class="btnback" onclick="logout()">Cerrar sesión</button>
</div>

<div id="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/create" style="font-family:var(--sans);font-weight:800;font-size:17px;letter-spacing:-1px;color:var(--text);text-decoration:none">🔥 BurnLink</a>
    <span class="badge">Admin</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <img id="tbAvatar" src="" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--border)" alt=""/>
    <span id="tbEmail" style="font-family:var(--mono);font-size:11px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button class="btn-sm" onclick="logout()">Salir</button>
  </div>
</div>

<div id="adminContent">
  <div class="wrap">
    <div style="margin:0 0 20px"><h2 style="font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:4px">Panel de administración</h2><p style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px">TODOS LOS BURNLINKS · TIEMPO REAL</p></div>
    <div class="stats">
      <div class="stat"><div class="sn" id="stTotal">0</div><div class="sl">TOTAL</div></div>
      <div class="stat"><div class="sn green" id="stActive">0</div><div class="sl">ACTIVOS</div></div>
      <div class="stat"><div class="sn red" id="stExp">0</div><div class="sl">EXPIRADOS</div></div>
    </div>
    <div class="toolbar">
      <div class="filters">
        <button class="fbtn active" data-f="all">Todos</button>
        <button class="fbtn" data-f="active">Activos</button>
        <button class="fbtn" data-f="expired">Expirados</button>
      </div>
      <button class="btn-de" id="btnDE">🗑 Borrar expirados</button>
    </div>
    <div id="adminList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyBLqHcWApjbbqjasgk-H4bGg5KN5Bf-Fss",authDomain:"burnlink-48b09.firebaseapp.com",projectId:"burnlink-48b09",storageBucket:"burnlink-48b09.firebasestorage.app",messagingSenderId:"102519825848",appId:"1:102519825848:web:6a3d1ac53fbff5de611b4d"});
const auth=firebase.auth(),db=firebase.firestore(),col=db.collection('burnlinks');
const ADMINS=['bryanescobar00899@gmail.com','yunik.arg@gmail.com'];
let allLinks=[],curFilter='all',unsub=null;
const TI={text:'✉️',url:'🔗',image:'🖼️',file:'📎',qr:'◼️',audio:'🎵',video:'🎥'};

function toast(msg,type){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}t.textContent=msg;t.className='toast '+(type||'');void t.offsetWidth;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}
function fmtCD(ms){const s=Math.max(0,Math.floor(ms/1000));if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';return Math.floor(s/3600)+'h';}
function fmtDate(ts){return new Date(ts).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});}
function fmtDur(s){if(s<60)return s+'s';if(s<3600)return Math.round(s/60)+'m';if(s<86400)return Math.round(s/3600)+'h';return Math.round(s/86400)+'d';}

function logout(){if(unsub){unsub();unsub=null;}auth.signOut();}

document.getElementById('btnLogin').addEventListener('click',async()=>{
  const p=new firebase.auth.GoogleAuthProvider();p.setCustomParameters({prompt:'select_account'});
  try{await auth.signInWithPopup(p);}catch(e){toast('Error al iniciar sesión.','error');}
});

auth.onAuthStateChanged(user=>{
  if(!user){document.getElementById('loading').style.display='none';document.getElementById('loginScreen').style.display='flex';return;}
  if(!ADMINS.includes(user.email.toLowerCase())){
    document.getElementById('loading').style.display='none';
    document.getElementById('deniedEmail').textContent=user.email;
    document.getElementById('deniedScreen').style.display='flex';return;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('adminContent').style.display='block';
  document.getElementById('tbAvatar').src=user.photoURL||'';
  document.getElementById('tbEmail').textContent=user.email;
  if(unsub)unsub();
  unsub=col.orderBy('created','desc').onSnapshot(snap=>{
    allLinks=snap.docs.map(d=>d.data());
    const now=Date.now(),total=allLinks.length,exp=allLinks.filter(l=>now>l.expiresAt||(l.oneUse&&l.used)).length;
    document.getElementById('stTotal').textContent=total;
    document.getElementById('stActive').textContent=total-exp;
    document.getElementById('stExp').textContent=exp;
    renderList();
  });
});

function renderList(){
  const c=document.getElementById('adminList'),now=Date.now();
  let list=allLinks;
  if(curFilter==='active')list=allLinks.filter(l=>now<=l.expiresAt&&!(l.oneUse&&l.used));
  else if(curFilter==='expired')list=allLinks.filter(l=>now>l.expiresAt||(l.oneUse&&l.used));
  if(!list.length){c.innerHTML='<div class="empty">// sin links en esta categoría</div>';return;}
  c.innerHTML=list.map(l=>{
    const exp=now>l.expiresAt||(l.oneUse&&l.used);
    const rem=l.expiresAt-now;
    const burn=window.location.origin+'/?id='+l.id;
    const dest=l.type==='url'?(l.content.url||'').substring(0,50):l.type==='text'?(l.content.text||'').substring(0,50):(l.content.name||l.type);
    const stag=exp?(l.oneUse&&l.used?'<span class="tag tu">USADO</span>':'<span class="tag te">EXPIRADO</span>'):'<span class="tag ta">ACTIVO</span>';
    const right=exp?'<span class="bd">DESTRUIDO</span>':`<div class="icd" data-exp="${l.expiresAt}">${fmtCD(rem)}</div>`;
    return`<div class="item${exp?' exp':''}">
      <div><div class="idest">${TI[l.type]||'🔗'} ${dest}${dest.length>=50?'…':''}</div>
      <div class="iburn">🔗 ${burn.substring(0,55)}${burn.length>55?'…':''}</div>
      <div class="itags">${stag}${l.oneUse?'<span class="tag ti">1 uso</span>':''}<span class="tag ti">${fmtDur(l.duration)} · ${fmtDate(l.created)}</span></div></div>
      <div class="iactions">${right}<button class="bdel" onclick="delLink('${l.id}')">🗑 Borrar</button></div>
    </div>`;
  }).join('');
}

async function delLink(id){
  if(!confirm('Borrar este link?'))return;
  try{await col.doc(id).delete();toast('Link eliminado.','success');}catch(e){toast('Error.','error');}
}

document.getElementById('btnDE').addEventListener('click',async()=>{
  const now=Date.now(),exp=allLinks.filter(l=>now>l.expiresAt||(l.oneUse&&l.used));
  if(!exp.length){toast('No hay expirados.');return;}
  if(!confirm('Borrar '+exp.length+' expirados?'))return;
  try{const b=db.batch();exp.forEach(l=>b.delete(col.doc(l.id)));await b.commit();toast(exp.length+' eliminados.','success');}catch(e){toast('Error.','error');}
});

document.querySelectorAll('.fbtn').forEach(btn=>{btn.addEventListener('click',function(){document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));this.classList.add('active');curFilter=this.dataset.f;renderList();});});

setInterval(()=>{const now=Date.now();document.querySelectorAll('.icd[data-exp]').forEach(el=>{const rem=parseInt(el.dataset.exp)-now;if(rem<=0){renderList();}else el.textContent=fmtCD(rem);});},1000);
</script>
</body>
</html>
